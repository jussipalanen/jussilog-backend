version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
        INSTALL_DEV_DEPS: "true"
    container_name: jussilog-backend
    restart: unless-stopped
    ports:
      - "8000:8080"
    env_file:
      - .env
    environment:
      # Application
      APP_NAME: JussiLog
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: "${APP_DEBUG:-true}"
      APP_URL: ${APP_URL:-http://localhost:8000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}

      # Database - MySQL (default)
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-jussilog}
      DB_USERNAME: ${DB_USERNAME:-jussilog}
      DB_PASSWORD: ${DB_PASSWORD:-jussilog}

      # Cache & Session
      CACHE_DRIVER: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync

      # Logging
      LOG_CHANNEL: stderr
      LOG_LEVEL: ${LOG_LEVEL:-debug}

      # Port for Cloud Run compatibility
      PORT: 8080
    volumes:
      # Persist storage directory
      - ./storage:/var/www/html/storage
      # Persist bootstrap cache
      - ./bootstrap/cache:/var/www/html/bootstrap/cache

      # Hot-reload development mounts (optional - comment out for production)
      - ./app:/var/www/html/app
      - ./lang:/var/www/html/lang
      - ./routes:/var/www/html/routes
      - ./resources:/var/www/html/resources
      - ./config:/var/www/html/config
      - ./public:/var/www/html/public
      - ./database:/var/www/html/database
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - jussilog-network

  mysql:
    image: mysql:8.0
    container_name: jussilog-mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_DATABASE:-jussilog}
      MYSQL_USER: ${DB_USERNAME:-jussilog}
      MYSQL_PASSWORD: ${DB_PASSWORD:-jussilog}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - jussilog-network

networks:
  jussilog-network:
    driver: bridge

volumes:
  mysql_data:

