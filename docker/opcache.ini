; OPCache settings for Cloud Run production.
; Edit this file and redeploy — no Dockerfile change needed.

opcache.enable=1
; Disable CLI caching (Artisan commands, migration job, etc.)
opcache.enable_cli=0
; MB of shared memory for the opcode cache.
opcache.memory_consumption=128
; MB for interned strings (class/function names, docblocks).
opcache.interned_strings_buffer=16
; Maximum number of PHP files that can be cached.
opcache.max_accelerated_files=20000
; 0 = never check timestamps after first load (fastest; safe for immutable containers).
opcache.validate_timestamps=0
opcache.revalidate_freq=0
