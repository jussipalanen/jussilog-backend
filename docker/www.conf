[www]
user = laravel
group = laravel

listen = 127.0.0.1:9000

; dynamic: workers are spawned/reaped based on load — saves ~180MB RAM vs static=8
pm = dynamic
pm.max_children = 3
pm.start_servers = 1
pm.min_spare_servers = 1
pm.max_spare_servers = 2
; recycle workers every 500 requests to prevent slow memory growth
pm.max_requests = 500

; Ensure environment variables are passed to PHP
clear_env = no

; Catch worker output
catch_workers_output = yes

; Fix PATH
env[PATH] = /usr/local/bin:/usr/bin:/bin
env[TMP] = /tmp
env[TMPDIR] = /tmp
env[TEMP] = /tmp
