[www]
user = laravel
group = laravel

listen = 127.0.0.1:9000

; Dynamic PM so idle instances don't keep N workers allocated at fixed cost.
pm = dynamic
pm.max_children = 8
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 4
pm.process_idle_timeout = 10s
; Recycle workers periodically to prevent slow memory growth.
pm.max_requests = 500

; Ensure environment variables are passed to PHP
clear_env = no

; Catch worker output
catch_workers_output = yes

; Fix PATH
env[PATH] = /usr/local/bin:/usr/bin:/bin
env[TMP] = /tmp
env[TMPDIR] = /tmp
env[TEMP] = /tmp
