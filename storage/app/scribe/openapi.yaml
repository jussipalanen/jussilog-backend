                  example: jussi@example.com
                token:
                  type: string
                  description: 'Reset token'
                  example: consequatur
                password:
                  type: string
                  description: 'New password.'
                  example: newpassword
                password_confirmation:
                  type: string
                  description: 'Password confirmation.'
                  example: newpassword
              required:
                - email
