          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Must not be greater than 100 characters.'
                  example: vmqeopfuudtdsufvyvddq
              required:
                - name
  '/api/blog-categories/{id}':
    put:
      summary: 'Update a blog category.'
      operationId: updateABlogCategory
