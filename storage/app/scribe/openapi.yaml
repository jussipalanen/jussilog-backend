  /api/my-invoices:
    get:
      summary: 'List invoices for the authenticated user.'
      operationId: listInvoicesForTheAuthenticatedUser
      description: 'Returns a paginated list of invoices belonging to the currently authenticated user.'
      parameters:
        -
          in: query
          name: per_page
          description: 'Items per page (1–100).'
          example: 10
          required: false
          schema:
            type: integer
            description: 'Items per page (1–100).'
            example: 10
        -
          in: query
          name: page
          description: 'Page number.'
          example: 1
          required: false
          schema:
            type: integer
            description: 'Page number.'
            example: 1
        -
          in: query
          name: status
          description: 'Filter by status (draft, issued, paid, cancelled).'
          example: paid
          required: false
          schema:
            type: string
            description: 'Filter by status (draft, issued, paid, cancelled).'
            example: paid
        -
          in: query
          name: sort_by
          description: 'Sort field (id, invoice_number, subtotal, total, status, issued_at, paid_at, created_at).'
          example: created_at
          required: false
          schema:
            type: string
            description: 'Sort field (id, invoice_number, subtotal, total, status, issued_at, paid_at, created_at).'
            example: created_at
        -
          in: query
          name: sort_dir
          description: 'Sort direction (asc, desc).'
          example: desc
          required: false
          schema:
            type: string
            description: 'Sort direction (asc, desc).'
            example: desc
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
      tags:
        - Invoices
  /api/invoices/options:
    get:
      summary: 'Return available invoice statuses and item types with translated labels.'
      operationId: returnAvailableInvoiceStatusesAndItemTypesWithTranslatedLabels
      description: ''
      parameters:
        -
          in: query
          name: lang
          description: 'Language code (en, fi). Defaults to en.'
          example: fi
          required: false
