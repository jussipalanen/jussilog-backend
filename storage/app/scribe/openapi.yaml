                  example: en
                  enum:
                    - en
                    - fi
                  nullable: true
              required:
                - question
      security: []
  '/api/resumes/{id}/preview/pdf/render':
    get:
      summary: 'Render a resume as an inline PDF via a signed URL (no auth token required).'
      operationId: renderAResumeAsAnInlinePDFViaASignedURLnoAuthTokenRequired
      description: 'Obtain the URL from the signed-url endpoint first.'
      parameters: []
      responses:
        403:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Invalid signature.'
                properties:
                  message:
                    type: string
                    example: 'Invalid signature.'
      tags:
        - Endpoints
      security: []
    parameters:
      -
        in: path
        name: id
        description: 'The ID of the resume.'
        example: consequatur
        required: true
        schema:
          type: string
  '/api/resumes/{id}/preview/html/render':
