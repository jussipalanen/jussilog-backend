      operationId: registerANewUser
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name:
                  type: string
                  description: 'First name.'
                  example: Jussi
                last_name:
                  type: string
                  description: 'Last name.'
                  example: Palanen
                username:
                  type: string
                  description: Username.
                  example: jussi
                email:
                  type: string
                  description: 'Email address.'
                  example: jussi@example.com
                password:
                  type: string
                  description: Password.
                  example: strongpassword
              required:
                - first_name
                - last_name
                - username
                - email
                - password
