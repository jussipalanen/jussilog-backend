  /api/blogs:
    get:
      summary: 'List published blog posts (public).'
      operationId: listPublishedBlogPostspublic
      description: ''
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  current_page: 1
                  data: []
                  first_page_url: 'http://localhost:8000/api/blogs?page=1'
                  from: null
                  last_page: 1
                  last_page_url: 'http://localhost:8000/api/blogs?page=1'
                  links:
                    -
                      url: null
                      label: '&laquo; Previous'
                      active: false
                    -
                      url: 'http://localhost:8000/api/blogs?page=1'
                      label: '1'
                      active: true
                    -
                      url: null
                      label: 'Next &raquo;'
                      active: false
                  next_page_url: null
                  path: 'http://localhost:8000/api/blogs'
                  per_page: 15
                  prev_page_url: null
                  to: null
                  total: 0
                properties:
                  current_page:
                    type: integer
                    example: 1
                  data:
                    type: array
                    example: []
                  first_page_url:
                    type: string
                    example: 'http://localhost:8000/api/blogs?page=1'
                  from:
                    type: string
                    example: null
                    nullable: true
                  last_page:
                    type: integer
                    example: 1
                  last_page_url:
                    type: string
                    example: 'http://localhost:8000/api/blogs?page=1'
                  links:
                    type: array
                    example:
                      -
                        url: null
                        label: '&laquo; Previous'
                        active: false
                      -
                        url: 'http://localhost:8000/api/blogs?page=1'
                        label: '1'
                        active: true
                      -
                        url: null
                        label: 'Next &raquo;'
                        active: false
                    items:
                      type: object
                      properties:
                        url:
                          type: string
                          example: null
                          nullable: true
                        label:
                          type: string
                          example: '&laquo; Previous'
                        active:
                          type: boolean
                          example: false
                  next_page_url:
                    type: string
                    example: null
                    nullable: true
                  path:
                    type: string
                    example: 'http://localhost:8000/api/blogs'
                  per_page:
                    type: integer
                    example: 15
                  prev_page_url:
                    type: string
                    example: null
                    nullable: true
                  to:
                    type: string
                    example: null
                    nullable: true
                  total:
                    type: integer
                    example: 0
      tags:
        - Blog
      security: []
    post:
      summary: 'Create a blog post.'
      operationId: createABlogPost
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Blog
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                title:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: vmqeopfuudtdsufvyvddq
                excerpt:
                  type: string
                  description: ''
                  example: consequatur
                  nullable: true
                content:
                  type: string
                  description: ''
                  example: consequatur
                blog_category_id:
                  type: integer
                  description: 'The <code>id</code> of an existing record in the blog_categories table.'
                  example: 17
                  nullable: true
                featured_image:
                  type: string
                  format: binary
                  description: 'Must be a file. Must be an image. Must not be greater than 5120 kilobytes.'
                  nullable: true
                tags:
                  type: array
                  description: 'Must not be greater than 100 characters.'
                  example:
                    - mqeopfuudtdsufvyvddqa
                  items:
                    type: string
                visibility:
                  type: boolean
                  description: ''
                  example: true
              required:
                - title
                - content
  '/api/blogs/{idOrSlug}':
    get:
      summary: 'Show a single published blog post (public).'
      operationId: showASinglePublishedBlogPostpublic
      description: ''
      parameters: []
      responses:
