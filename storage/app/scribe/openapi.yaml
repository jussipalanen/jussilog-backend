paths:
  /api/agent/resume/suggestions:
    get:
      summary: 'Get a list of suggested questions for the AI agent.'
      operationId: getAListOfSuggestedQuestionsForTheAIAgent
      description: ''
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  suggestions:
                    -
                      en: 'Who is Jussi Alanen?'
                      fi: 'Kuka on Jussi Alanen?'
                    -
                      en: 'What are the main skills on this resume?'
                      fi: 'Mitkä ovat tärkeimmät taidot?'
                    -
                      en: 'What work experience does Jussi have?'
                      fi: 'Millainen työkokemus Jussilla on?'
                    -
                      en: 'What is the educational background?'
                      fi: 'Mikä on koulutustausta?'
                    -
                      en: 'What projects has Jussi worked on?'
                      fi: 'Missä projekteissa Jussi on ollut mukana?'
                    -
                      en: 'What certifications does Jussi have?'
                      fi: 'Mitä sertifikaatteja Jussilla on?'
                    -
                      en: 'Where can I find the LinkedIn profile?'
                      fi: 'Mistä löydän LinkedIn-profiilin?'
                    -
                      en: 'What languages does Jussi speak?'
                      fi: 'Mitä kieliä Jussi osaa?'
                    -
                      en: 'Tell about your resume/CV?'
                      fi: 'Kerro ansioluettelostasi?'
                properties:
                  suggestions:
                    type: array
                    example:
                      -
                        en: 'Who is Jussi Alanen?'
                        fi: 'Kuka on Jussi Alanen?'
                      -
                        en: 'What are the main skills on this resume?'
                        fi: 'Mitkä ovat tärkeimmät taidot?'
                      -
                        en: 'What work experience does Jussi have?'
                        fi: 'Millainen työkokemus Jussilla on?'
                      -
                        en: 'What is the educational background?'
                        fi: 'Mikä on koulutustausta?'
                      -
                        en: 'What projects has Jussi worked on?'
                        fi: 'Missä projekteissa Jussi on ollut mukana?'
                      -
                        en: 'What certifications does Jussi have?'
                        fi: 'Mitä sertifikaatteja Jussilla on?'
                      -
                        en: 'Where can I find the LinkedIn profile?'
                        fi: 'Mistä löydän LinkedIn-profiilin?'
                      -
                        en: 'What languages does Jussi speak?'
                        fi: 'Mitä kieliä Jussi osaa?'
                      -
                        en: 'Tell about your resume/CV?'
                        fi: 'Kerro ansioluettelostasi?'
                    items:
                      type: object
                      properties:
                        en:
                          type: string
                          example: 'Who is Jussi Alanen?'
                        fi:
                          type: string
                          example: 'Kuka on Jussi Alanen?'
      tags:
        - 'AI Agent'
      security: []
  /api/admin/thumbnails/regenerate:
    post:
      summary: 'Regenerate thumbnail images for products and/or resumes.'
      operationId: regenerateThumbnailImagesForProductsAndorResumes
      description: ''
      parameters:
        -
          in: query
          name: type
          description: 'Which model to process: products, resumes, or all (default).'
          example: all
          required: false
          schema:
            type: string
            description: 'Which model to process: products, resumes, or all (default).'
            example: all
      responses: {  }
      tags:
        - 'Admin – Thumbnails'
  /api/admin/thumbnails:
    delete:
