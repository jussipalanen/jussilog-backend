            schema:
              type: object
              properties:
                title:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: vmqeopfuudtdsufvyvddq
                excerpt:
                  type: string
                  description: ''
                  example: consequatur
                  nullable: true
                content:
                  type: string
                  description: ''
                  example: consequatur
                blog_category_id:
                  type: integer
                  description: 'The <code>id</code> of an existing record in the blog_categories table.'
                  example: 17
                  nullable: true
                featured_image:
                  type: string
                  format: binary
                  description: 'Must be a file. Must be an image. Must not be greater than 5120 kilobytes.'
                  nullable: true
                tags:
                  type: array
                  description: 'Must not be greater than 100 characters.'
                  example:
                    - mqeopfuudtdsufvyvddqa
                  items:
                    type: string
                visibility:
                  type: boolean
                  description: ''
                  example: true
    delete:
      summary: 'Delete a blog post.'
      operationId: deleteABlogPost
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Blog
    parameters:
      -
        in: path
        name: id
        description: 'The ID of the blog.'
        example: 17
        required: true
        schema:
          type: integer
  /api/blog-categories:
