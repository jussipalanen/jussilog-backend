steps:
  # Step 1: Build and push the Docker image with Kaniko (layer-cache aware)
  - name: gcr.io/kaniko-project/executor:latest
    args:
      - --destination=${_IMAGE}
      - --cache=true
      - --cache-ttl=168h
      - --compressed-caching=false
      - --snapshot-mode=redo
      - --use-new-run=true
      - --context=dir:///workspace
      - --dockerfile=Dockerfile

  # Step 2: Deploy image to Cloud Run with all env vars in one shot
  # (combining deploy + set-env-vars avoids a second rolling restart)
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - jussilog-backend-production
      - --image
      - ${_IMAGE}
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --execution-environment=gen2
      - --allow-unauthenticated
      - --set-cloudsql-instances=${_PROJECT_ID}:${_REGION}:jussilog-db
      - --min-instances=1
      - --max-instances=3
      - --memory=512Mi
      - --cpu=1
      - --concurrency=80
      - --timeout=60
      - --cpu-boost           # extra CPU during container startup → faster cold-start
      - --set-env-vars
      - >-
        APP_NAME=JussiLog,
        APP_ENV=production,
        APP_DEBUG=false,
        APP_KEY=${_APP_KEY},
        APP_URL=${_APP_URL},
        FRONTEND_URL=${_FRONTEND_URL},
        DB_CONNECTION=mysql,
        DB_HOST=localhost,
        DB_SOCKET=/cloudsql/${_PROJECT_ID}:${_REGION}:jussilog-db,
        DB_PORT=3306,
        DB_DATABASE=${_DB_DATABASE},
        DB_USERNAME=${_DB_USERNAME},
        DB_PASSWORD=${_DB_PASSWORD},
        CACHE_DRIVER=file,
        SESSION_DRIVER=file,
        QUEUE_CONNECTION=sync,
        LOG_CHANNEL=stderr,
        LOG_LEVEL=error,
        FILESYSTEM_DISK=${_FILESYSTEM_DISK},
        GCS_ACCESS_KEY_ID=${_GCS_ACCESS_KEY_ID},
        GCS_SECRET_ACCESS_KEY=${_GCS_SECRET_ACCESS_KEY},
        GCS_DEFAULT_REGION=us,
        GCS_BUCKET=${_GCS_BUCKET},
        GCS_URL=,
        GCS_ENDPOINT=https://storage.googleapis.com,
        GCS_USE_PATH_STYLE_ENDPOINT=false,
        MAIL_ENABLED=${_MAIL_ENABLED},
        MAIL_MAILER=smtp,
        MAIL_HOST=${_MAIL_HOST},
        MAIL_PORT=587,
        MAIL_USERNAME=${_MAIL_USERNAME},
        MAIL_PASSWORD=${_MAIL_PASSWORD},
        MAIL_ENCRYPTION=tls,
        MAIL_FROM_ADDRESS=${_MAIL_FROM_ADDRESS},
        MAIL_FROM_NAME=JussiLog,
        SCRIBE_BASE_URL=${_APP_URL},
        SCRIBE_TRY_IT_OUT_BASE_URL=${_APP_URL},
        SCRIBE_AUTH_KEY=${_SCRIBE_AUTH_KEY},
        GOOGLE_CLIENT_ID=${_GOOGLE_CLIENT_ID},
        UPDATE_USER_ROLE_SECRET=${_UPDATE_USER_ROLE_SECRET},
        ROLE_UPDATE_KEY=${_ROLE_UPDATE_KEY}

substitutions:
  _REGION: europe-north1
  _PROJECT_ID: client-jussimatic
  _IMAGE: europe-north1-docker.pkg.dev/${_PROJECT_ID}/jussilog-backend/jussilog-backend:latest
  # Secrets — pass via Cloud Build trigger substitutions or --substitutions flag:
  #   gcloud builds submit --substitutions=_APP_KEY="base64:...",_DB_PASSWORD="secret",...
  _APP_KEY: ''
  _DB_DATABASE: 'jussilog'
  _DB_USERNAME: 'jussilog'
  _DB_PASSWORD: ''
  _APP_URL: ''
  _FRONTEND_URL: ''
  _FILESYSTEM_DISK: 'gcs'
  _GCS_ACCESS_KEY_ID: ''
  _GCS_SECRET_ACCESS_KEY: ''
  _GCS_BUCKET: ''
  _MAIL_ENABLED: 'true'
  _MAIL_HOST: 'smtp-relay.brevo.com'
  _MAIL_USERNAME: ''
  _MAIL_PASSWORD: ''
  _MAIL_FROM_ADDRESS: ''
  _SCRIBE_AUTH_KEY: ''
  _GOOGLE_CLIENT_ID: ''
  _UPDATE_USER_ROLE_SECRET: ''
  _ROLE_UPDATE_KEY: ''

options:
  machineType: E2_HIGHCPU_8    # faster Kaniko builds, lower wall-clock time
  logging: CLOUD_LOGGING_ONLY  # skip GCS build log bucket → lower storage cost

timeout: 480s
