steps:
  # Step 1: Build and push the Docker image with Kaniko (layer-cache aware)
  - name: gcr.io/kaniko-project/executor:latest
    args:
      - --destination=${_IMAGE}
      - --cache=true
      - --cache-ttl=168h
      - --compressed-caching=false
      - --snapshot-mode=redo
      - --use-new-run=true
      - --context=dir:///workspace
      - --dockerfile=Dockerfile

  # Step 2: Deploy image to Cloud Run with all env vars in one shot
  # Secrets are injected from Secret Manager via the secretEnv mechanism below.
  # Non-secret config values are passed as plain substitution variables.
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    secretEnv:
      - APP_KEY
      - DB_PASSWORD
      - GCS_ACCESS_KEY_ID
      - GCS_SECRET_ACCESS_KEY
      - MAIL_PASSWORD
      - GOOGLE_CLIENT_ID
      - UPDATE_USER_ROLE_SECRET
      - ROLE_UPDATE_KEY
    args:
      - -c
      - |
        gcloud run deploy jussilog-backend-production \
          --image=${_IMAGE} \
          --region=${_REGION} \
          --platform=managed \
          --execution-environment=gen2 \
          --allow-unauthenticated \
          --set-cloudsql-instances=${_PROJECT_ID}:${_REGION}:jussilog-db \
          --min-instances=1 \
          --max-instances=3 \
          --memory=512Mi \
          --cpu=1 \
          --concurrency=16 \
          --timeout=60 \
          --cpu-boost \
          --set-env-vars="APP_NAME=JussiLog,\
        APP_ENV=production,\
        APP_DEBUG=false,\
        APP_KEY=$$APP_KEY,\
        APP_URL=${_APP_URL},\
        FRONTEND_URL=${_FRONTEND_URL},\
        DB_CONNECTION=mysql,\
        DB_HOST=localhost,\
        DB_SOCKET=/cloudsql/${_PROJECT_ID}:${_REGION}:jussilog-db,\
        DB_PORT=3306,\
        DB_DATABASE=${_DB_DATABASE},\
        DB_USERNAME=${_DB_USERNAME},\
        DB_PASSWORD=$$DB_PASSWORD,\
        CACHE_DRIVER=file,\
        SESSION_DRIVER=file,\
        QUEUE_CONNECTION=sync,\
        LOG_CHANNEL=stderr,\
        LOG_LEVEL=error,\
        FILESYSTEM_DISK=${_FILESYSTEM_DISK},\
        GCS_ACCESS_KEY_ID=$$GCS_ACCESS_KEY_ID,\
        GCS_SECRET_ACCESS_KEY=$$GCS_SECRET_ACCESS_KEY,\
        GCS_DEFAULT_REGION=us,\
        GCS_BUCKET=${_GCS_BUCKET},\
        GCS_URL=,\
        GCS_ENDPOINT=https://storage.googleapis.com,\
        GCS_USE_PATH_STYLE_ENDPOINT=false,\
        MAIL_ENABLED=${_MAIL_ENABLED},\
        MAIL_MAILER=smtp,\
        MAIL_HOST=${_MAIL_HOST},\
        MAIL_PORT=587,\
        MAIL_USERNAME=${_MAIL_USERNAME},\
        MAIL_PASSWORD=$$MAIL_PASSWORD,\
        MAIL_ENCRYPTION=tls,\
        MAIL_FROM_ADDRESS=${_MAIL_FROM_ADDRESS},\
        MAIL_FROM_NAME=JussiLog,\
        SCRIBE_BASE_URL=${_APP_URL},\
        SCRIBE_TRY_IT_OUT_BASE_URL=${_APP_URL},\
        GOOGLE_CLIENT_ID=$$GOOGLE_CLIENT_ID,\
        UPDATE_USER_ROLE_SECRET=$$UPDATE_USER_ROLE_SECRET,\
        ROLE_UPDATE_KEY=$$ROLE_UPDATE_KEY"

# Non-secret config — safe to keep in substitutions or trigger UI
substitutions:
  _REGION: europe-north1
  _PROJECT_ID: client-jussimatic
  _IMAGE: europe-north1-docker.pkg.dev/${_PROJECT_ID}/jussilog-backend/jussilog-backend:latest
  _APP_URL: 'https://backend-jussilog.jussialanen.com'
  _FRONTEND_URL: 'https://www.jussialanen.com'
  _DB_DATABASE: 'jussilog'
  _DB_USERNAME: 'jussilog'
  _FILESYSTEM_DISK: 'gcs'
  _GCS_BUCKET: 'jussilog-backend-uploads'
  _MAIL_ENABLED: 'true'
  _MAIL_HOST: 'smtp-relay.brevo.com'
  _MAIL_USERNAME: 'a44f37001@smtp-brevo.com'
  _MAIL_FROM_ADDRESS: 'juzapala+noreply@gmail.com'

# Pull secrets from Secret Manager at build time.
# Secret names match the LARAVEL_BACKEND_ prefix used by update-secret-manager.sh,
# but are exposed to the build step under their plain env var names via envMap.
availableSecrets:
  secretManager:
    - versionName: projects/${_PROJECT_ID}/secrets/LARAVEL_BACKEND_APP_KEY/versions/latest
      env: APP_KEY
    - versionName: projects/${_PROJECT_ID}/secrets/LARAVEL_BACKEND_DB_PASSWORD/versions/latest
      env: DB_PASSWORD
    - versionName: projects/${_PROJECT_ID}/secrets/LARAVEL_BACKEND_GCS_ACCESS_KEY_ID/versions/latest
      env: GCS_ACCESS_KEY_ID
    - versionName: projects/${_PROJECT_ID}/secrets/LARAVEL_BACKEND_GCS_SECRET_ACCESS_KEY/versions/latest
      env: GCS_SECRET_ACCESS_KEY
    - versionName: projects/${_PROJECT_ID}/secrets/LARAVEL_BACKEND_MAIL_PASSWORD/versions/latest
      env: MAIL_PASSWORD
    - versionName: projects/${_PROJECT_ID}/secrets/LARAVEL_BACKEND_GOOGLE_CLIENT_ID/versions/latest
      env: GOOGLE_CLIENT_ID
    - versionName: projects/${_PROJECT_ID}/secrets/LARAVEL_BACKEND_UPDATE_USER_ROLE_SECRET/versions/latest
      env: UPDATE_USER_ROLE_SECRET
    - versionName: projects/${_PROJECT_ID}/secrets/LARAVEL_BACKEND_ROLE_UPDATE_KEY/versions/latest
      env: ROLE_UPDATE_KEY

options:
  machineType: E2_HIGHCPU_8    # faster Kaniko builds, lower wall-clock time
  logging: CLOUD_LOGGING_ONLY  # skip GCS build log bucket → lower storage cost

timeout: 480s
