steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_IMAGE}
      - --cache-from
      - ${_IMAGE}
      - --build-arg
      - BUILDKIT_INLINE_CACHE=1
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_IMAGE}

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - jussilog-backend-production
      - --image
      - ${_IMAGE}
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --set-env-vars
      - APP_ENV=production,APP_DEBUG=false,DB_CONNECTION=sqlite,APP_KEY=${_APP_KEY}
      - --min-instances=0
      - --max-instances=1
      - --memory=512Mi
      - --cpu=1
      - --concurrency=80
      - --timeout=60

images:
  - ${_IMAGE}

substitutions:
  _REGION: europe-north1
  _PROJECT_ID: client-jussimatic
  _IMAGE: europe-north1-docker.pkg.dev/${_PROJECT_ID}/jussilog-backend/jussilog-backend:latest
  _APP_KEY: ''

timeout: 600s

options:
  substitutionOption: ALLOW_LOOSE
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
  diskSizeGb: 10
